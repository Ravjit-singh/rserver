<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NexaPanel - Native Wrapper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: #0b0f19; font-family: 'Segoe UI', system-ui, sans-serif; 
            overflow: hidden; 
        }
        #appFrame { width: 100%; height: 100%; border: none; display: none; }
        
        .loader { 
            border: 4px solid #1e293b; border-top: 4px solid #10b981; 
            border-radius: 50%; width: 48px; height: 48px; 
            animation: spin 1s linear infinite; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    
    <div id="loadingScreen" class="flex flex-col items-center justify-center h-full px-6">
        <div class="loader mb-6"></div>
        <h2 class="text-xl font-bold text-white mb-2">Scanning Network...</h2>
        <p class="text-sm text-slate-400">Attempting to locate Bedrock Engine</p>
    </div>

    <div id="setupScreen" class="hidden flex-col items-center justify-center h-full px-6">
        <div class="bg-slate-900 border border-slate-800 p-8 rounded-3xl shadow-2xl w-full max-w-md flex flex-col items-center text-center">
            <div class="w-16 h-16 bg-gradient-to-tr from-emerald-500 to-cyan-500 rounded-2xl flex items-center justify-center shadow-lg shadow-emerald-500/20 mb-6">
                <svg class="w-8 h-8 text-slate-900" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2v-4zm10 0a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2v-4z"></path></svg>
            </div>
            <h2 class="text-2xl font-bold text-white mb-2">Target Required</h2>
            <p class="text-sm text-slate-400 mb-6">Enter the Local Wi-Fi IP address of your host device.</p>
            
            <input type="text" id="ipInput" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-white text-center font-mono mb-4 focus:outline-none focus:border-emerald-500 transition-colors" placeholder="e.g. 192.168.1.5">
            
            <button onclick="connectManual()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-bold py-3 rounded-xl transition-all mb-3 shadow-lg shadow-emerald-500/20">Inject UI Wrapper</button>
            <button onclick="clearMemory()" class="text-xs text-slate-500 hover:text-red-400 transition-colors">Clear Saved Target</button>
        </div>
    </div>

    <iframe id="appFrame" allowfullscreen></iframe>

    <script>
        const LOCAL_PORT = 3005;

        function launchIframe(url) {
            document.getElementById('loadingScreen').style.display = 'none';
            document.getElementById('setupScreen').style.display = 'none';
            const frame = document.getElementById('appFrame');
            frame.src = url;
            frame.style.display = 'block';
        }

        function showManualSetup() {
            document.getElementById('loadingScreen').style.display = 'none';
            document.getElementById('setupScreen').style.display = 'flex';
            
            const savedIp = localStorage.getItem('nexa_target_ip');
            if (savedIp) document.getElementById('ipInput').value = savedIp;
        }

        function connectManual() {
            let ip = document.getElementById('ipInput').value.trim();
            if (!ip) return alert('Enter a valid IP address or Tunnel URL.');
            
            // Format IP automatically
            ip = ip.replace('http://', '').replace('https://', '');
            if (ip.includes(':')) ip = ip.split(':')[0]; 
            
            localStorage.setItem('nexa_target_ip', ip);
            launchIframe(`http://${ip}:${LOCAL_PORT}`);
        }

        function clearMemory() {
            localStorage.removeItem('nexa_target_ip');
            document.getElementById('ipInput').value = '';
        }

        // --- Auto-Resolve Logic ---
        async function autoDetectNetwork() {
            // Check if user has a saved IP memory first
            const savedIp = localStorage.getItem('nexa_target_ip');
            if (savedIp) {
                // Wait half a second for aesthetic loading, then launch
                setTimeout(() => launchIframe(`http://${savedIp}:${LOCAL_PORT}`), 600);
                return;
            }

            try {
                // Ping localhost first. If the wrapper is on the same device as the server, it will instantly reply.
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 1500); // 1.5s timeout
                
                // Using a simple image/favicon fetch to bypass CORS checks during the ping
                await fetch(`http://localhost:${LOCAL_PORT}/favicon.ico`, { mode: 'no-cors', signal: controller.signal });
                clearTimeout(timeoutId);
                
                // If it succeeds, launch instantly
                setTimeout(() => launchIframe(`http://localhost:${LOCAL_PORT}`), 500);

            } catch (err) {
                // If localhost doesn't reply (meaning this is being opened on a PC), fall back to manual entry
                showManualSetup();
            }
        }

        // Start scanning as soon as the file opens
        window.onload = autoDetectNetwork;

    </script>
</body>
</html>
